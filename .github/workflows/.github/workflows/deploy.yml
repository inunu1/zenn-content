name: Deploy to Zenn

on:
  push:
    branches:
      - main # 自分が使っているメインブランチ名（main または master）に合わせてください

jobs:
  deploy_articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy articles
        uses: zenn-dev/action-zenn-github-pages@v2
